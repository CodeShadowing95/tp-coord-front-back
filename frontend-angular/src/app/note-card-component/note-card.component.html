<div
  [ngClass]="{
    'bg-white border-gray-200': note.id !== 1,
    'bg-linear-to-r from-red-600 to-violet-600 text-white': note.id === 1
  }"
  class="rounded-2xl shadow-md p-4 border hover:shadow-lg transition"
>
  <div class="flex justify-between items-center gap-4 mb-2">
    <h2
      [class]="
        note.id !== 1
          ? 'text-xl font-semibold text-gray-800'
          : 'text-xl font-bold text-white'
      "
    >
      {{ note.title }}
    </h2>
    <div class="flex justify-center items-center w-8 h-8 bg-blue-600 text-xs text-white font-semibold rounded-2xl">
      N°{{ note.id }}
    </div>
  </div>

  <p
    [class]="note.id !== 1 ? 'text-gray-600 mb-4 line-clamp-3' : 'text-white/90 mb-4 line-clamp-3'"
  >
    {{ note.content }}
  </p>

  <div class="flex justify-between items-center gap-2">
    <button
      [class]="
        note.id !== 1
          ? 'text-sm font-medium text-blue-600 cursor-pointer hover:underline'
          : 'text-sm font-medium text-white cursor-pointer hover:underline'
      "
      [routerLink]="['/notes', note.id]"
      [attr.data-note-id]="note.id"
    >
      {{ note.id !== 1 ? 'Voir la note →' : 'Je découvre ≫' }}
    </button>

    @if (isAdmin() && note.id !== 1) {
      <div class="flex justify-center items-center gap-2">
        <!-- Edit icon button -->
        <button
          type="button"
          class="inline-flex items-center justify-center text-green-500 bg-neutral-primary border border-green-500 hover:bg-green-500 hover:text-white focus:ring-4 focus:ring-green-300 rounded-lg w-8 h-8 focus:outline-none cursor-pointer transition duration-300"
          (click)="updateNote(note.id)"
          [attr.data-update-note]="note.id"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-pen-icon lucide-square-pen w-4 h-4"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/></svg>
          <span class="sr-only">Modifier note</span>
        </button>

        <!-- Delete icon button -->
        <button
          type="button"
          class="inline-flex items-center justify-center text-red-500 bg-neutral-primary border border-red-500 hover:bg-red-500 hover:text-white focus:ring-4 focus:ring-red-300 rounded-lg w-8 h-8 focus:outline-none cursor-pointer transition duration-300"
          (click)="deleteNote(note.id)"
          [attr.data-delete-note]="note.id"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash2-icon lucide-trash-2 w-4 h-4"><path d="M10 11v6"/><path d="M14 11v6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          <span class="sr-only">Supprimer note</span>
        </button>
      </div>
    }
  </div>

</div>
