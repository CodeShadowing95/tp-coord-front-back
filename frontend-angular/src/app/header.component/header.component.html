@if (isAuthenticated()) {
<div class="flex justify-between items-center space-x-4 mb-6">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">Springnote</h1>
  <button
    class="bg-red-500 hover:bg-red-400 text-white font-bold py-2 px-4 border-b-4 border-red-700 hover:border-red-500 rounded cursor-pointer"
    (click)="logout()"
  >
    Déconnexion
  </button>
</div>
}
